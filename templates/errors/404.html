{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-primary"><i class="bi bi-compass"></i></div>
    <h2 class="mt-3">404 &mdash; Page Not Found</h2>
    <p class="text-muted">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Back to Home</a>
</div>
{% endblock %}
