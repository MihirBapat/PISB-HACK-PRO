{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-danger"><i class="bi bi-exclamation-triangle"></i></div>
    <h2 class="mt-3">500 &mdash; Something Went Wrong</h2>
    <p class="text-muted">An unexpected error occurred. The database session has been rolled back.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Back to Home</a>
</div>
{% endblock %}
